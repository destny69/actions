name: Deploy Artifact
description: Downloads a packaged artifact from GitHub Packages, creates a rollback snapshot, and deploys it to a target path.

inputs:
  package-name:
    description: Package identifier used during the download request.
    required: true
  version-tag:
    description: Version or Git tag identifier for the artifact.
    required: true
  deploy-target-path:
    description: Destination path for the extracted artifact.
    required: true
  github-token:
    description: GitHub token with read access to the package.
    required: true
  server-user:
    description: Linux owner account for the deployed files.
    required: false
    default: 'www-data'

runs:
  using: composite
  steps:
    - name: Download artifact from GitHub Packages
      shell: bash
      env:
        PACKAGE_NAME: ${{ inputs.package-name }}
        VERSION_TAG: ${{ inputs.version-tag }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        GITHUB_REPOSITORY: ${{ github.event.repository.name }}
      run: |
        set -euo pipefail
        archive_name="${PACKAGE_NAME}-${VERSION_TAG}.zip"
        archive_path="${RUNNER_TEMP}/${archive_name}"
        package_url="https://maven.pkg.github.com/${GITHUB_REPOSITORY_OWNER}/${GITHUB_REPOSITORY}/${PACKAGE_NAME}/${VERSION_TAG}/${archive_name}"

        echo "Downloading artifact from $package_url"
        curl -fsSL -H "Authorization: Bearer ${GITHUB_TOKEN}" -o "$archive_path" "$package_url"

        if [[ ! -s "$archive_path" ]]; then
          echo "::error::Artifact download failed or the archive is empty."
          exit 1
        fi

    - name: Create rollback snapshot
      shell: bash
      env:
        DEPLOY_TARGET_PATH: ${{ inputs.deploy-target-path }}
        PACKAGE_NAME: ${{ inputs.package-name }}
        VERSION_TAG: ${{ inputs.version-tag }}
      run: |
        set -euo pipefail
        deploy_path="${DEPLOY_TARGET_PATH}"
        backup_root="/rollback/${PACKAGE_NAME}-${VERSION_TAG}-$(date +%Y%m%d%H%M%S)"
        mkdir -p "$backup_root"

        if [[ -d "$deploy_path" ]]; then
          cp -a "$deploy_path"/. "$backup_root"/
        else
          mkdir -p "$deploy_path"
        fi

        echo "backup_root=$backup_root" >> "$GITHUB_ENV"

    - name: Extract artifact payload
      shell: bash
      env:
        DEPLOY_TARGET_PATH: ${{ inputs.deploy-target-path }}
        PACKAGE_NAME: ${{ inputs.package-name }}
        VERSION_TAG: ${{ inputs.version-tag }}
      run: |
        set -euo pipefail
        deploy_path="${DEPLOY_TARGET_PATH}"
        archive_path="${RUNNER_TEMP}/${PACKAGE_NAME}-${VERSION_TAG}.zip"

        mkdir -p "$deploy_path"
        find "$deploy_path" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
        unzip -o "$archive_path" -d "$deploy_path"

    - name: Apply Linux permissions
      shell: bash
      env:
        DEPLOY_TARGET_PATH: ${{ inputs.deploy-target-path }}
        SERVER_USER: ${{ inputs.server-user }}
      run: |
        set -euo pipefail
        deploy_path="${DEPLOY_TARGET_PATH}"

        if [[ -d "$deploy_path" ]]; then
          chown -R "${SERVER_USER}:${SERVER_USER}" "$deploy_path"
          find "$deploy_path" -type d -exec chmod 0755 {} +
          find "$deploy_path" -type f -exec chmod 0644 {} +
        else
          echo "::error::Deploy target path '$deploy_path' does not exist."
          exit 1
        fi
